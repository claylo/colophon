# JSON Schema for colophon curate output.
#
# This schema is authored in YAML for readability and converted to JSON
# at request time via `yj` for the `claude --json-schema` flag.
#
# Claude receives raw candidates from the extract pipeline and returns
# curated terms. Location data is NOT included here — it is mapped from
# the original candidates file in post-processing.

type: object
required: [terms]
additionalProperties: false

properties:
  terms:
    description: >
      Curated terms that belong in a back-of-book index and glossary.
      Each entry is a concept worth looking up — not a fragment, not a
      generic word, not the topic the entire book is about.
    type: array
    items:
      type: object
      required: [term, definition]
      additionalProperties: false
      properties:
        term:
          description: >
            Canonical display form of the term, properly cased.
            Example: "OAuth 2.0", not "oauth 2.0" or "OAUTH 2.0".
          type: string

        definition:
          description: >
            One-sentence glossary definition. Should be understandable
            without reading the source material. No more than ~30 words.
          type: string

        parent:
          description: >
            The `term` value of a broader concept this term belongs under.
            Creates hierarchy in the index. Example: "OAuth" might have
            parent "authentication". Omit if the term is top-level.
          type: string

        aliases:
          description: >
            Other surface forms that refer to the same concept. Used to
            merge candidate variants. Must be exact candidate term strings
            from the input so post-processing can map locations.
            Example: ["OAuth 2.0", "OAuth2"] for canonical term "OAuth".
          type: array
          items:
            type: string

        see_also:
          description: >
            Related terms the reader might also want to look up.
            Each value must be another term's `term` field in this output.
          type: array
          items:
            type: string

        main_files:
          description: >
            Files where this term is substantively discussed (not just
            mentioned). These become bold page numbers in the index.
            Values are filenames from the candidate locations.
          type: array
          items:
            type: string

  suggested:
    description: >
      Important terms that the automated extraction missed but that
      clearly belong in the index based on the source material context.
      These have no candidate locations — they will be located by
      searching the source files in post-processing.
    type: array
    items:
      type: object
      required: [term, definition]
      additionalProperties: false
      properties:
        term:
          description: Canonical display form.
          type: string

        definition:
          description: One-sentence glossary definition.
          type: string

        parent:
          description: Parent term for hierarchy (omit if top-level).
          type: string
