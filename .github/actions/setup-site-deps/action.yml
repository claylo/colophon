name: Setup site dependencies
description: Install npm and site dependencies for the documentation site

runs:
  using: composite
  steps:

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 22

    - name: Install dependencies
      shell: bash
      working-directory: site
      run: npm ci

